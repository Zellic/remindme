version: '3.8'
services:
  remindme-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env

  redis:  # Only needed for local testing — in prod, point REDIS_HOST at the shared instance
    image: redis:latest
    restart: unless-stopped
    volumes:
      - ./redis-data:/data
    ports:
      - "6380:6379"  # 6380 to avoid colliding with the main bot's redis on the same host
    profiles:
      - need_redis
